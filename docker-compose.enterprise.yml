services:
  api:
    image: threatforge-enterprise-api:0.11.0-local

    build:
      context: .
      dockerfile: Dockerfile.enterprise
      args:
        BASE_IMAGE: community-api:latest

    environment:
      THREATFORGE_EDITION: enterprise
      THREATFORGE_ENTERPRISE_LICENSE_FILE: /run/secrets/threatforge-license.json
      THREATFORGE_ENTERPRISE_PUBLIC_KEY_FILE: /run/secrets/threatforge-license-public.pem
      THREATFORGE_ENTERPRISE_LICENSE_KEY_ID: ${THREATFORGE_ENTERPRISE_LICENSE_KEY_ID}
      THREATFORGE_ENTERPRISE_INSTALLATION_ID: ${THREATFORGE_ENTERPRISE_INSTALLATION_ID}
      THREATFORGE_SECRET_DIR: /run/secrets

    volumes:
      - ${THREATFORGE_ENTERPRISE_LICENSE_HOST_FILE}:/run/secrets/threatforge-license.json:ro
      - ${THREATFORGE_ENTERPRISE_PUBLIC_KEY_HOST_FILE}:/run/secrets/threatforge-license-public.pem:ro
      - ${THREATFORGE_TELEGRAM_COLLECTION_BOT_TOKEN_HOST_FILE:-/dev/null}:/run/secrets/telegram-collection-bot-token:ro

  collector:
    profiles: ["telegram-collector"]
    image: threatforge-enterprise-api:0.11.0-local
    command: ["python", "-m", "app.collection.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://threatforge:${POSTGRES_PASSWORD}@db:5432/threatforge
      THREATFORGE_EDITION: enterprise
      THREATFORGE_ENTERPRISE_LICENSE_FILE: /run/secrets/threatforge-license.json
      THREATFORGE_ENTERPRISE_PUBLIC_KEY_FILE: /run/secrets/threatforge-license-public.pem
      THREATFORGE_ENTERPRISE_LICENSE_KEY_ID: ${THREATFORGE_ENTERPRISE_LICENSE_KEY_ID}
      THREATFORGE_ENTERPRISE_INSTALLATION_ID: ${THREATFORGE_ENTERPRISE_INSTALLATION_ID}
      THREATFORGE_SECRET_DIR: /run/secrets
      THREATFORGE_COLLECTION_WORKER_ENABLED: ${THREATFORGE_COLLECTION_WORKER_ENABLED:-false}
      THREATFORGE_COLLECTION_POLL_INTERVAL: ${THREATFORGE_COLLECTION_POLL_INTERVAL:-15}
      THREATFORGE_COLLECTION_HEARTBEAT_FILE: /tmp/threatforge-collector-heartbeat
      THREATFORGE_COLLECTION_HEARTBEAT_MAX_AGE: ${THREATFORGE_COLLECTION_HEARTBEAT_MAX_AGE:-90}
      THREATFORGE_INTELLIGENCE_AUTO_FINDING: ${THREATFORGE_INTELLIGENCE_AUTO_FINDING:-false}
      THREATFORGE_INTELLIGENCE_AUTO_CASE: ${THREATFORGE_INTELLIGENCE_AUTO_CASE:-false}
      THREATFORGE_INTELLIGENCE_FINDING_THRESHOLD: ${THREATFORGE_INTELLIGENCE_FINDING_THRESHOLD:-60}
      THREATFORGE_INTELLIGENCE_CASE_THRESHOLD: ${THREATFORGE_INTELLIGENCE_CASE_THRESHOLD:-80}
      THREATFORGE_INTELLIGENCE_ANALYSIS_BATCH_SIZE: ${THREATFORGE_INTELLIGENCE_ANALYSIS_BATCH_SIZE:-25}
      THREATFORGE_INTELLIGENCE_CONTEXT_WINDOW_SECONDS: ${THREATFORGE_INTELLIGENCE_CONTEXT_WINDOW_SECONDS:-900}
      THREATFORGE_INTELLIGENCE_CONTEXT_MAX_EVENTS: ${THREATFORGE_INTELLIGENCE_CONTEXT_MAX_EVENTS:-10}
    volumes:
      - evidence_data:/data/evidence
      - ${THREATFORGE_ENTERPRISE_LICENSE_HOST_FILE}:/run/secrets/threatforge-license.json:ro
      - ${THREATFORGE_ENTERPRISE_PUBLIC_KEY_HOST_FILE}:/run/secrets/threatforge-license-public.pem:ro
      - ${THREATFORGE_TELEGRAM_COLLECTION_BOT_TOKEN_HOST_FILE:-/dev/null}:/run/secrets/telegram-collection-bot-token:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.collection.healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: on-failure:5
