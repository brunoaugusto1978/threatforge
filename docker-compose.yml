services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: threatforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: threatforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatforge"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    environment:
      API_KEY: ${API_KEY:?defina API_KEY no .env}
      DATABASE_URL: postgresql+psycopg2://threatforge:${POSTGRES_PASSWORD}@db:5432/threatforge
      ABUSECH_API_KEY: ${ABUSECH_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-28800}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      ALERT_MIN_VERDICT: ${ALERT_MIN_VERDICT:-suspicious}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TO: ${SMTP_TO:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
