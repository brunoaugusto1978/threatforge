name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  selftest:
    name: Selftest
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./test_ci.db
      API_KEY: ci-api-key-change-me
      JWT_SECRET: ci-jwt-secret-change-me
      COOKIE_SECURE: "false"
      APP_BASE_URL: http://localhost:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import application
        run: |
          python - <<'PY'
          from app.main import app
          print("ThreatForge app import: OK")
          PY

      - name: Run isolation selftest
        run: |
          python -m app.selftest_isolation
